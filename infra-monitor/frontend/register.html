<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Инфра Монитор</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
            <div class="text-center mb-6">
                <i class="fas fa-user-plus text-4xl text-green-600"></i>
                <h2 class="text-2xl font-bold mt-2">Регистрация</h2>
                <p class="text-gray-500 text-sm">Инфра Монитор - КИИ Платформа</p>
            </div>

            <form id="register-form">
                <input type="text" id="username" placeholder="Логин" class="w-full border rounded-lg px-4 py-2 mb-4" required>
                <input type="email" id="email" placeholder="Email" class="w-full border rounded-lg px-4 py-2 mb-4" required>
                <input type="password" id="password" placeholder="Пароль" class="w-full border rounded-lg px-4 py-2 mb-4" required>

                <!-- Капча -->
                <div class="g-recaptcha mb-4" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div>

                <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
                    Зарегистрироваться
                </button>
            </form>

            <div id="success-message" class="hidden text-green-600 text-sm mt-4 text-center"></div>
            <div id="error-message" class="hidden text-red-600 text-sm mt-4 text-center"></div>

            <p class="text-center text-sm text-gray-600 mt-6">
                Уже есть аккаунт? <a href="login.html" class="text-blue-600 hover:underline">Войти</a>
            </p>
            <p class="text-center text-sm text-gray-500 mt-2">
                <a href="index.html" class="hover:underline">← Вернуться на главную</a>
            </p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const captchaResponse = grecaptcha.getResponse();

            // Скрываем старые сообщения
            document.getElementById('success-message').classList.add('hidden');
            document.getElementById('error-message').classList.add('hidden');

            if (!captchaResponse) {
                document.getElementById('error-message').innerText = 'Пожалуйста, подтвердите, что вы не робот';
                document.getElementById('error-message').classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        captcha_token: captchaResponse
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Показываем сообщение об успехе
                    document.getElementById('success-message').innerText = data.message || 'Регистрация успешна! Проверьте почту для подтверждения.';
                    document.getElementById('success-message').classList.remove('hidden');
                    grecaptcha.reset();

                    // Сохраняем user_id в localStorage
                    if (data.user_id) {
                        localStorage.setItem('temp_user_id', data.user_id);
                    }

                    // Перенаправляем на страницу ввода кода через 2 секунды
                    setTimeout(() => {
                        window.location.href = `verify.html?user_id=${data.user_id}`;
                    }, 2000);
                } else {
                    document.getElementById('error-message').innerText = data.detail || 'Ошибка регистрации';
                    document.getElementById('error-message').classList.remove('hidden');
                    grecaptcha.reset();
                }
            } catch (error) {
                console.error('Registration error:', error);
                document.getElementById('error-message').innerText = 'Ошибка соединения с сервером';
                document.getElementById('error-message').classList.remove('hidden');
                grecaptcha.reset();
            }
        });
    </script>
</body>
</html>
