<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инфра Монитор - Дашборд КИИ</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        #map { height: 500px; border-radius: 12px; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-alert {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Шапка -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-shield-alt text-2xl text-red-600"></i>
                    <h1 class="text-xl font-bold text-gray-800">Инфра Монитор - КИИ Дашборд</h1>
                </div>
                <div id="user-info" class="flex items-center space-x-4">
                    <span id="username" class="text-gray-600"></span>
                    <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">
                        <i class="fas fa-sign-out-alt"></i> Выйти
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Контент -->
    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- Форма логина -->
        <div id="login-form" class="hidden">
            <div class="bg-white rounded-lg shadow-lg p-8 max-w-md mx-auto">
                <h2 class="text-2xl font-bold mb-6 text-center">Вход в систему</h2>
                <form id="login">
                    <input type="text" id="login-username" placeholder="Логин" class="w-full border rounded-lg px-4 py-2 mb-4" required>
                    <input type="password" id="login-password" placeholder="Пароль" class="w-full border rounded-lg px-4 py-2 mb-4" required>
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </button>
                </form>
                <p id="login-error" class="text-red-500 text-sm mt-4 hidden"></p>
            </div>
        </div>

        <!-- Дашборд -->
        <div id="dashboard" class="hidden">
            <!-- Статистика -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="text-gray-500 text-sm">Всего объектов</div>
                    <div id="total-objects" class="text-2xl font-bold">0</div>
                </div>
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="text-gray-500 text-sm">В норме</div>
                    <div id="normal-objects" class="text-2xl font-bold text-green-600">0</div>
                </div>
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="text-gray-500 text-sm">Тревога</div>
                    <div id="alert-objects" class="text-2xl font-bold text-red-600">0</div>
                </div>
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="text-gray-500 text-sm">Инцидентов</div>
                    <div id="incidents-today" class="text-2xl font-bold">0</div>
                </div>
            </div>

            <!-- Карта -->
            <div class="bg-white rounded-lg shadow p-4 mb-6">
                <h2 class="text-lg font-semibold mb-3">Карта объектов</h2>
                <div id="map"></div>
            </div>

            <!-- Панель действий -->
            <div id="action-panel" class="bg-white rounded-lg shadow p-4 mb-6"></div>

            <!-- Список объектов -->
            <div id="objects-list" class="bg-white rounded-lg shadow p-4 mb-6">
                <h2 class="text-lg font-semibold mb-3">Список объектов</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="p-2 text-left">ID</th>
                                <th class="p-2 text-left">Название</th>
                                <th class="p-2 text-left">Тип</th>
                                <th class="p-2 text-left">Координаты</th>
                                <th class="p-2 text-left">Статус</th>
                                <th class="p-2 text-left">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="objects-table"></tbody>
                    </table>
                </div>
            </div>

            <!-- Логи (только админ) -->
            <div id="logs-panel" class="bg-white rounded-lg shadow p-4 hidden">
                <h2 class="text-lg font-semibold mb-3">Журнал событий</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="p-2 text-left">Время</th>
                                <th class="p-2 text-left">Действие</th>
                                <th class="p-2 text-left">Детали</th>
                            </tr>
                        </thead>
                        <tbody id="logs-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
